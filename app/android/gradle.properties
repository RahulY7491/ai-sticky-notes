# JVM heap for the Gradle daemon.
#
# Why these numbers:
#   -Xmx4g sits comfortably inside GitHub Actions' ubuntu-latest runner
#   (~7 GB total) while still being plenty for a Flutter Android build.
#   8g + 4g metaspace caused OOM kills in CI even though it works
#   locally on 16/32 GB machines. If you ever start failing locally on
#   "Java heap space" errors during R8 minification, bump -Xmx to 6g —
#   but keep CI in mind.
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError

android.useAndroidX=true
android.enableJetifier=false

# Parallel project builds — speeds up multi-module projects (Flutter
# plugins compile as separate modules) with no downside.
org.gradle.parallel=true
org.gradle.caching=true
