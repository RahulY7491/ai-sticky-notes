name: ai_sticky_notes
description: AI-powered sticky notes — summarize, extract tasks, generate emails, and set reminders.
publish_to: 'none'
version: 1.0.4+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.2
  # Local database (web + Android)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Smart reminders (Android)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.3
  flutter_timezone: ^3.0.1
  # Home screen widget
  home_widget: ^0.9.0
  # Sharing
  share_plus: ^10.0.2
  # HTTP for Gemini AI API
  http: ^1.2.1
  # Voice input
  speech_to_text: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#6750A4"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
