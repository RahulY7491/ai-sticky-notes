name: Bug report
description: Something is broken or behaves differently than documented
title: "bug: <short summary>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out
        as much of the form as you can — incomplete reports are the
        single biggest cause of delays.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, factual description of what you observed.
      placeholder: "When I tap the mic and stay silent for 15 seconds, the sheet freezes instead of showing the 'Didn't catch that' error."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "After 15 seconds of silence the sheet should switch to the error state."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: |
        Numbered, copy-paste-able steps. If you have a minimal code
        snippet or a screen recording, include it here.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Which part of the project?
      multiple: true
      options:
        - Flutter app (app/)
        - Backend API (backend/)
        - CI/CD workflows (.github/)
        - Docs
    validations:
      required: true

  - type: input
    id: flutter-version
    attributes:
      label: Flutter version
      description: Output of `flutter --version` (only if the Flutter app is affected)
      placeholder: "Flutter 3.41.4 • channel stable"

  - type: input
    id: dotnet-version
    attributes:
      label: .NET version
      description: Output of `dotnet --version` (only if the backend is affected)
      placeholder: "8.0.204"

  - type: input
    id: device-os
    attributes:
      label: Device / OS
      placeholder: "Pixel 7, Android 14"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Console output, stack traces, screenshots. Wrap long output in
        triple backticks. Never paste API keys.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched [existing issues](https://github.com/RahulY7491/ai-sticky-notes/issues?q=is%3Aissue) and this isn't a duplicate.
          required: true
        - label: I have not included any secrets (API keys, tokens, passwords).
          required: true
