# ──────────────────────────────────────────────────────────────────────
# Android release build — produces a downloadable APK whenever you push
# a version tag (e.g. `git tag v1.0.5 && git push origin v1.0.5`).
# This is the "CD" half of CI/CD: turning source code into a deployable
# artifact. The APK is unsigned/debug-keystore-signed; switch to a real
# signing config when you're ready to publish to the Play Store.
# ──────────────────────────────────────────────────────────────────────
name: android-build

on:
  push:
    tags:
      - "v*" # any tag that starts with v, e.g. v1.0.0
  workflow_dispatch: # also allow manual builds without tagging

jobs:
  apk:
    name: Build release APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Flutter needs a JDK to drive Gradle (the Android build tool).
      # Temurin is a well-supported OpenJDK distribution.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # The Gemini API key is injected as a Dart `--dart-define`. Set
      # `GEMINI_API_KEY` in Settings -> Secrets and variables -> Actions
      # in your GitHub repo. If the secret is missing the build still
      # succeeds, but `AiService.hasApiKey` will be false at runtime.
      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"

      # Upload the APK so you can download it from the workflow's summary
      # page on GitHub.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-sticky-notes-release-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
